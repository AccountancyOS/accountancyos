name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Typecheck + Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsc -p tsconfig.app.json --noEmit
      - name: Vitest regression suite
        run: bun test

  smoke:
    name: Post-Deploy Smoke (manual / deployment-gated)
    runs-on: ubuntu-latest
    # Smoke depends on live secrets. Run manually or after a deploy job.
    if: github.event_name == 'workflow_dispatch'
    needs: test
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SMOKE_SERVICE_ROLE_KEY: ${{ secrets.SMOKE_SERVICE_ROLE_KEY }}
      SMOKE_RLS_ORG_A_EMAIL: ${{ secrets.SMOKE_RLS_ORG_A_EMAIL }}
      SMOKE_RLS_ORG_A_PASSWORD: ${{ secrets.SMOKE_RLS_ORG_A_PASSWORD }}
      SMOKE_RLS_ORG_B_EMAIL: ${{ secrets.SMOKE_RLS_ORG_B_EMAIL }}
      SMOKE_RLS_ORG_B_PASSWORD: ${{ secrets.SMOKE_RLS_ORG_B_PASSWORD }}
      SMOKE_RLS_ORG_B_CLIENT_ID: ${{ secrets.SMOKE_RLS_ORG_B_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run smoke
        run: bun scripts/smoke-test.ts